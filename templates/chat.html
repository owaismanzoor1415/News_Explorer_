<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>News Explorer</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/css/style.css">
<link rel="manifest" href="/static/manifest.json">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="app">

<div id="overlay"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">

<h2><i class="fa-solid fa-newspaper"></i> News Explorer</h2>

<button class="new-chat" onclick="newChat()">
<i class="fa-solid fa-plus"></i> New Search
</button>

<div class="chat-history" id="history"></div>

</aside>

<!-- Chat Area -->
<main class="chat-area">

<header class="chat-header">

<button class="menu-btn" onclick="toggleSidebar()">
<i class="fa-solid fa-bars"></i>
</button>

<h1>Real-Time News Search</h1>

<button id="installBtn" class="install-btn" style="display:none;">
Install App
</button>

</header>

<div id="messages" class="messages"></div>

<!-- Trending suggestions -->
<div class="trending">

<button onclick="quickSearch('World News')">World</button>
<button onclick="quickSearch('India News')">India</button>
<button onclick="quickSearch('Technology News')">Tech</button>
<button onclick="quickSearch('Sports News')">Sports</button>

</div>

<div class="input-area">

<input
id="query"
placeholder="Search any news topic..."
onkeypress="if(event.key==='Enter') send()"
/>

<button onclick="send()">
<i class="fa-solid fa-paper-plane"></i>
</button>

</div>

</main>

</div>

<script src="/static/js/chat.js"></script>

<script>

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/static/service-worker.js');
}

let deferredPrompt;

window.addEventListener('beforeinstallprompt',(e)=>{

e.preventDefault();
deferredPrompt=e;

document.getElementById("installBtn").style.display="block";

});

document.getElementById("installBtn").addEventListener("click",async()=>{

deferredPrompt.prompt();
await deferredPrompt.userChoice;

});

</script>

</body>
</html>
