<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>GenAI News Explorer</title>

<link rel="stylesheet" href="/static/css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="app">

<!-- Sidebar -->
<aside class="sidebar">

<h2><i class="fa-solid fa-newspaper"></i> News Explorer</h2>

<button class="new-chat" onclick="newChat()">
<i class="fa-solid fa-plus"></i> New Search
</button>

<div class="chat-history" id="history"></div>

</aside>


<!-- Chat Area -->
<main class="chat-area">

<header class="chat-header">
<h1>Real-Time News Search</h1>
</header>

<div id="messages" class="messages"></div>


<div class="input-area">

<input
id="query"
placeholder="Search any news topic..."
onkeypress="if(event.key==='Enter') send()"
/>

<button onclick="send()">
<i class="fa-solid fa-paper-plane"></i>
</button>

</div>

</main>

</div>



<script>

let history = JSON.parse(localStorage.getItem("history")) || [];


function renderHistory(){

const h = document.getElementById("history");

h.innerHTML = `
<div style="display:flex;justify-content:space-between;align-items:center;">
<h3>Recent Searches</h3>
<button onclick="clearHistory()" class="clear-btn">Clear</button>
</div>
`;

history.slice().reverse().forEach((item,index)=>{

h.innerHTML += `
<div class="history-item">

<span onclick="reuse('${item.replace(/'/g,"\\'")}')">
${item}
</span>

<i class="fa-solid fa-xmark delete-icon"
onclick="deleteItem(${history.length-1-index})"></i>

</div>
`;

});

}


function deleteItem(index){

history.splice(index,1);

localStorage.setItem("history",JSON.stringify(history));

renderHistory();

}


function clearHistory(){

history=[];

localStorage.removeItem("history");

renderHistory();

}


function reuse(text){
document.getElementById("query").value=text;
}


function newChat(){
document.getElementById("messages").innerHTML="";
}


function send(){

let q=document.getElementById("query").value;

if(!q) return;


if(!history.includes(q)){
history.push(q);
localStorage.setItem("history",JSON.stringify(history));
renderHistory();
}


const messages=document.getElementById("messages");


messages.innerHTML+=`
<div class="message user animate">
${q}
</div>
`;


messages.innerHTML+=`
<div class="message bot loading animate">
<i class="fa-solid fa-spinner fa-spin"></i> Fetching latest news...
</div>
`;


messages.scrollTop=messages.scrollHeight;


fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({query:q})
})

.then(res=>res.json())

.then(data=>{

document.querySelector(".loading").remove();


let newsHTML="";


data.news.forEach(article=>{

newsHTML+=`
<div class="news-card">

<h4>${article.title}</h4>

<p>
<i class="fa-solid fa-globe"></i>
${article.source}
</p>

<a href="${article.url}" target="_blank">
<i class="fa-solid fa-arrow-up-right-from-square"></i>
Read full article
</a>

</div>
`;

});


messages.innerHTML+=`
<div class="message bot animate">

<b><i class="fa-solid fa-robot"></i> AI Summary</b>

<p>${data.summary}</p>

<hr>

<b><i class="fa-solid fa-bolt"></i> Latest News</b>

${newsHTML}

</div>
`;


messages.scrollTop=messages.scrollHeight;

});


document.getElementById("query").value="";

}


renderHistory();

</script>

</body>
</html>
